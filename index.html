<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="manifest.json">
  <title>Cálculos electrónicos con Angelmicelti</title>

  <!--[if lt IE 9]>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html5shiv/3.7.3/html5shiv.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/respond.js/1.4.2/respond.min.js"></script>
  <![endif]-->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    /* Reset global */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    html { font-size: 16px; }

    /* Fondo tenue con pseudo-elemento */
    body {
      position: relative;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: #333;
      background: #f5f5f5;
    }
    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: url('images/fondo-electronica.jpg') center/cover no-repeat;
      opacity: 0.20; /* Opacidad aumentada para ver mejor el fondo */
      z-index: -1;
    }

    header {
      background: #1a1a2e;
      color: #fff;
      text-align: center;
      padding: 1.5rem 1rem;
    }
    header h1 {
      font-size: clamp(1.5rem, 4vw, 2.5rem);
      line-height: 1.2;
    }

    nav {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 1.5rem;
      padding: 2rem 1rem;
      max-width: 1200px;
      margin: 0 auto;
    }

    /* Botones flexibles entre 300×300 y 500×500 */
    .btn {
      position: relative;
      flex: 1 1 300px;
      min-width: 300px;
      max-width: 500px;
      width: 100%;
      aspect-ratio: 1 / 1;
      background-color: #fff;
      background-position: center;
      background-repeat: no-repeat;
      background-size: contain;
      border: 4px solid rgba(0,0,0,0.1);
      border-radius: 8px;
      box-shadow: 0 6px 16px rgba(0,0,0,0.12);
      transition: transform .3s ease, box-shadow .3s ease, border-color .3s ease;
      text-decoration: none;
      overflow: hidden;
    }
    .btn:hover {
      transform: translateY(-6px);
      box-shadow: 0 10px 24px rgba(0,0,0,0.16);
      border-color: rgba(0,0,0,0.2);
    }

    .btn .label {
      position: absolute;
      bottom: .75rem;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: rgba(255,255,255,0.9);
      padding: .5rem 1rem;
      border-radius: 4px;
      font-size: 1.8rem;
      color: #222;
      opacity: 0;
      transition: opacity .3s ease, transform .3s ease;
      pointer-events: none;
    }
    .btn:hover .label {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* Imágenes de cada botón */
    #transistor   { background-image: url('images/transistor.png'); }
    #diodo        { background-image: url('images/diodo.png'); }
    #led          { background-image: url('images/led.png'); }
    #condensador  { background-image: url('images/condensador.png'); }
    #resistencias { background-image: url('images/resistencias.png'); }

    /* Símbolos al hacer hover */
    #transistor:hover   { background-image: url('images/transistor-symbol.png'); }
    #diodo:hover        { background-image: url('images/diodo-symbol.png'); }
    #led:hover          { background-image: url('images/led-symbol.png'); }
    #condensador:hover  { background-image: url('images/condensador-symbol.png'); }
    #resistencias:hover { background-image: url('images/resistencias-symbol.png'); }

    footer {
      background: #1a1a2e;
      color: #fff;
      text-align: center;
      padding: 1rem;
      font-size: .9rem;
    }
    footer a {
      color: #66fcf1;
      text-decoration: none;
    }
    footer a:hover {
      text-decoration: underline;
    }

    /* En pantallas muy pequeñas, cada botón ocupa toda la fila */
    @media (max-width: 300px) {
      .btn {
        flex: 0 0 100%;
        min-width: 100%;
      }
    }

    /* Estilos Navegación Universal */
    .universal-nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 60px;
      background: rgba(26, 26, 46, 0.95);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      z-index: 9999;
      display: flex;
      align-items: center;
      padding: 0 1.5rem;
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }
    .nav-content {
      max-width: 1200px;
      width: 100%;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .nav-logo {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      text-decoration: none;
      color: #66fcf1;
      font-weight: 700;
      font-size: 1.25rem;
    }
    .nav-links {
      display: flex;
      gap: 1.25rem;
      align-items: center;
    }
    .nav-links a {
      text-decoration: none;
      color: rgba(255, 255, 255, 0.8);
      font-size: 0.9rem;
      font-weight: 500;
      transition: all 0.3s ease;
      padding: 0.5rem 0.75rem;
      border-radius: 8px;
    }
    .nav-links a:hover, .nav-links a.active {
      color: #66fcf1;
      background: rgba(102, 252, 241, 0.1);
    }
    
    @media (max-width: 768px) {
      .nav-logo span { display: none; }
      .nav-links { gap: 0.25rem; }
      .nav-links a { padding: 0.4rem 0.3rem; font-size: 0.75rem; }
    }
    @media (max-width: 480px) {
      .nav-links a { font-size: 0.7rem; }
    }

    body {
      padding-top: 60px;
    }
  </style>
</head>
<body>
  <nav class="universal-nav">
    <div class="nav-content">
      <a href="index.html" class="nav-logo">
        <i class="fas fa-microchip"></i>
        <span>Electrónica</span>
      </a>
      <div class="nav-links">
        <a href="index.html" class="active"><i class="fas fa-home"></i></a>
        <a href="Transistor.html">Transistores</a>
        <a href="Diodo.html">Diodos</a>
        <a href="Led.html">LEDs</a>
        <a href="Condensador.html">Condensadores</a>
        <a href="Resistencias.html">Resistencias</a>
      </div>
    </div>
  </nav>

  <header>
    <h1>Calcula electrónica con Angelmicelti</h1>
  </header>

  <nav>
    <a href="Transistor.html"   id="transistor"   class="btn" rel="noopener">
      <span class="label">Transistor</span>
    </a>
    <a href="Diodo.html"        id="diodo"        class="btn" rel="noopener">
      <span class="label">Diodo</span>
    </a>
    <a href="Led.html"          id="led"          class="btn" rel="noopener">
      <span class="label">LED</span>
    </a>
    <a href="Condensador.html"  id="condensador"  class="btn" rel="noopener">
      <span class="label">Condensador</span>
    </a>
    <a href="Resistencias.html" id="resistencias" class="btn" rel="noopener">
      <span class="label">Resistencias</span>
    </a>
  </nav>

  <footer>
    Visita mi web principal en
    <a href="https://angelmicelti.github.io" target="_blank" rel="noopener">
      angelmicelti.github.io
    </a>
  </footer>
<script>

    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js')
        .then(reg => console.log('Service Worker registrado con éxito', reg))
        .catch(err => console.error('Error al registrar el Service Worker', err));
    });
  }
</script>
</body>
</html>
